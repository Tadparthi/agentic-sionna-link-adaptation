name: Deploy static HTML to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repository files
        run: |
          pwd
          ls -la
          echo "Docs folder:"
          ls -la ./docs || true
          echo "HTML folder:"
          ls -la ./html || true

      - name: Ensure docs index exists
        run: |
          mkdir -p ./docs
          if [ ! -f ./docs/index.html ] && [ -f ./html/sionna_link_adaptation_interactive.html ]; then
            cp ./html/sionna_link_adaptation_interactive.html ./docs/index.html
          fi
          touch ./docs/.nojekyll
          ls -la ./docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site from docs folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4# refresh workflow
